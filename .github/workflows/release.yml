name: Create Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore project
        run: dotnet restore ./src/EaseStay/EaseStay.csproj

      - name: Build project
        run: dotnet build ./src/EaseStay/EaseStay.csproj --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish ./src/EaseStay/EaseStay.csproj -c Release -o ./dist

      - name: Zip publish folder
        run: |
          cd dist
          zip -r ../app.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: app.zip