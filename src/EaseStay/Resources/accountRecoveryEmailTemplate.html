<!DOCTYPE html>
<html lang="pt">
<head>
    <meta http-serif="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail EaseStay</title>
    <style>
        body, table, td, p, h1, h3 {
            font-family: 'Segoe UI', Arial, sans-serif !important;
        }

        p, h1, h3 {
            margin: 0;
        }
    </style>
</head>
<body style="margin: 0; padding: 30px; background-color: #FAFAFA;">

    <table width="100%" max-width="550" border="0" cellspacing="0" cellpadding="0" style="max-width: 550px;">

        <tr>
            <td style="padding-bottom: 25px;">
                <h3 style="margin-bottom: 3px; font-size: 14px; font-weight: bold; color: #7F7F7F; text-transform: uppercase;">
                    Conta EaseStay
                </h3>
                <h1 style="font-family: 'Segoe UI Light', 'Segoe UI', Arial, sans-serif; font-size: 36px; font-weight: 100; color: #1E90FF; line-height: 42px;">
                    Código de segurança
                </h1>
            </td>
        </tr>

        <tr>
            <td style="font-size: 16px; color: #333333; line-height: 24px; padding-bottom: 25px;">
                <p>
                    Utilize o seguinte código de segurança para a sua
                    <strong style="color: #111111;">conta EaseStay {{Email}}</strong>.
                </p>
            </td>
        </tr>

        <tr>
            <td style="padding-bottom: 30px;">
                <p style="font-size: 14px; color: #666666; margin-bottom: 5px;">Código de segurança:</p>
                <p style="font-size: 32px; font-weight: bold; color: #1E90FF; letter-spacing: 2px;">
                    {{RecoverCode}}
                </p>
            </td>
        </tr>

        <tr>
            <td style="font-size: 15px; color: #666666; line-height: 22px; border-top: 1px solid #EAEAEA; padding-top: 20px;">
                <p>Obrigado,</p>
                <p><strong>A equipa da conta EaseStay</strong></p>
            </td>
        </tr>

    </table>

</body>
</html>
